<!DOCTYPE html><html lang="zh-CN"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>天子方辰 桃园 | PeachyFang Peach Garden</title><meta http-equiv="refresh" content="0;url=/zh/"><link rel="canonical" href="https://peachyfang.muxiaokong.com/"><link rel="alternate" hreflang="zh-CN" href="https://peachyfang.muxiaokong.com/zh/"><link rel="alternate" hreflang="en" href="https://peachyfang.muxiaokong.com/en/"><script>
        const supportedLangs = ['zh', 'en'];
        const savedLang = localStorage.getItem('siteLang');

        if (savedLang && supportedLangs.includes(savedLang)) {
            window.location.replace(`/${savedLang}/`);
        } else {
            const browserLang = navigator.language.toLowerCase();
            let targetLang = 'zh'; // default

            if (browserLang.startsWith('en')) {
                targetLang = 'en';
            } else {
                targetLang = 'zh';
            }

            window.location.replace(`/${targetLang}/`);
        }
    </script></head> <body></body></html>
